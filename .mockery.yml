# mockery v3 config — run `mockery` at repo root to regenerate all mocks.
# Mocks are placed in a sibling mocks/ package so they never link into
# production binaries. Tests import them as mocks.MockMergeRequestSource.
#
# Add a new entry under interfaces: whenever a new port is added to the
# service package and needs a test double.

all: false
formatter: goimports
template: testify
require-template-schema-exists: true
log-level: warn

packages:
  github.com/ceffo/mrboard/internal/domain/service/mrsvc:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      pkgname: "mocks"
      filename: "mock_{{.InterfaceName}}.go"
      structname: "Mock{{.InterfaceName}}"
    interfaces:
      MergeRequestSource:
  github.com/ceffo/mrboard/internal/domain/service/jirasvc:
    config:
      dir: "{{.InterfaceDir}}/mocks"
      pkgname: "mocks"
      filename: "mock_{{.InterfaceName}}.go"
      structname: "Mock{{.InterfaceName}}"
    interfaces:
      JiraEnricher:
      JiraLinker:
